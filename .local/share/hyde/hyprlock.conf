#! Hyprlock Boilerplate Configuration File

#  Hyprlock default configuration file handler
$BACKGROUND_PATH = $XDG_CACHE_HOME/hyde/wall.set.png
$HYPRLOCK_BACKGROUND = $XDG_CACHE_HOME/hyde/wallpapers/hyprlock.png
$SPLASH_CMD = hyde-shell app -t scope -- hyprlock.sh --mpris "$(playerctl -l | tail -n1)" || hyprctl splash
$MPRIS_TEXT = hyde-shell app -t scope -- hyprlock.sh --mpris "$(playerctl -l | tail -n1)"
$MPRIS_IMAGE = $XDG_CACHE_HOME/hyde/landing/mpris.png
$PROFILE_IMAGE = $XDG_CACHE_HOME/hyde/landing/profile.png
$GREET_TEXT =echo "Good $(date +%H | awk '{if ($1 < 12) print "Morning  "; else if ($1 < 18) print "Afternoon  "; else print "Evening  "}')"
# $CAVA_CMD= { [ -f /tmp/hyprlock-cava ] && tail -n 1 /tmp/hyprlock-cava 2>/dev/null ;}  ||  { hyprctl dispatch exec "hyprlock.sh cava  && rm /tmp/hyprlock-cava" ;}
$CAVA_CMD= echo Not supported by Hyprlock
$WEATHER_CMD = echo "<b>Feels like<big> $(curl -s 'https://wttr.in/$WEATHER_LOCATION?format=%t' | tr -d '+') </big></b>"
$BATTERY_ICON = battery.sh icon

# hyprlang noerror true
# Source users custom hyprlock layout
source = $XDG_CONFIG_HOME/hypr/hyde.conf #
# hyprlang noerror false


# See the file first to see the equivalent colors
source = $XDG_CONFIG_HOME/hypr/themes/colors.conf

general{
    fractional_scaling=1
    # immediate_render=true
    # grace = true
}

background {
    color = $wallbash_pry1_rgba
}

label {
    text = cmd[update:86400000] font.sh resolve "$LAYOUT_PATH" & disown
    position = 0%, 0%
    font_size = 20
    valign = bottom
    halign = left
}

auth {
    pam:enabled = true
    pam:module = hyprlock
    fingerprint:enabled = $HYDE_FPRINT
    fingerprint:retry_delay = 1200
    fingerprint:ready_message = Scan fingerprint to unlock
    fingerprint:present_message = Scanning fingerprint
}

label {
    text = $FPRINTPROMPT
    color = $wallbash_txt2_rgba
    font_size = 16
    position = 0, 44
    halign = center
    valign = bottom
}

label {
    text = $FPRINTFAIL
    color = rgba(FF7070FF)
    font_size = 14
    position = 0, 20
    halign = center
    valign = bottom
}


# Source Layouts
hyprlang noerror true
source = $LAYOUT_PATH
hyprlang noerror false
